<!DOCTYPE html>
<html lang="zh-CN" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆几何探索 - 交互式数学学习平台</title>
    <meta name="description" content="探索圆的相关几何定理，通过交互式动画和可视化学习数学知识">
    <meta name="theme-color" content="#4361ee">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 全局基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        /* 无障碍工具栏样式 */
        .accessibility-toolbar {
            background: #f5f5f5;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .toolbar-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .toolbar-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            background: #4361ee;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }
        .toolbar-btn:hover {
            background: #3a56d4;
        }
        /* 色盲模式样式 */
        .colorblind-mode {
            filter: invert(1) hue-rotate(180deg);
        }
        /* 黑白模式样式 */
        .grayscale-mode {
            filter: grayscale(100%);
        }
        /* 盲人模式（高对比度+大字体） */
        .blind-mode {
            background: #000 !important;
            color: #fff !important;
            font-size: 18px !important;
            line-height: 1.8 !important;
        }
        .blind-mode * {
            color: #fff !important;
            background: #000 !important;
            border-color: #fff !important;
        }
        /* DEEP深色模式 */
        .deep-mode {
            background: #121212;
            color: #e0e0e0;
        }
        .deep-mode .accessibility-toolbar {
            background: #1e1e1e;
            border-color: #333;
        }
        .deep-mode .navbar {
            background: #1e1e1e;
        }
        /* 导航栏样式 */
        .navbar {
            background: #4361ee;
            padding: 16px 0;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-link {
            color: white;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 24px;
        }
        .nav-link {
            color: white;
            font-size: 16px;
        }
        .nav-toggle span {
            display: block;
            width: 25px;
            height: 3px;
            background: white;
            margin: 5px 0;
        }
        /* 基础布局样式（简化版，保证展示效果） */
        section {
            padding: 40px 0;
        }
        .minimal-hero {
            text-align: center;
            margin: 40px 0;
        }
        .hero-content h1 {
            font-size: 42px;
            margin-bottom: 16px;
            color: #2d3748;
        }
        .hero-subtitle {
            font-size: 18px;
            color: #718096;
            margin-bottom: 24px;
        }
        .btn-primary, .btn-secondary {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            font-size: 16px;
            margin: 0 8px;
        }
        .btn-primary {
            background: #4361ee;
            color: white;
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #2d3748;
        }
        /* 隐藏工具栏 */
        .toolbar-hidden {
            display: none !important;
        }
        /* 其余样式简化，保证页面正常展示 */
        .rules-grid, .usp-grid, .diversity-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .rule-item, .usp-item, .diversity-item {
            padding: 20px;
            border-radius: 8px;
            background: #f9f9f9;
            text-align: center;
        }
        .footer {
            background: #2d3748;
            color: white;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <!-- 无障碍工具栏（带交互功能） -->
    <div class="accessibility-toolbar" id="accessibility-toolbar">
        <div id="aria-descriptions" class="aria-description" style="display:none;" aria-live="polite"></div>
        <div class="container">
            <div class="toolbar-controls">
                <button class="toolbar-btn" id="colorblind-toggle" aria-label="色盲模式">
                    <span class="toolbar-icon">👁️‍🗨️</span>
                    <span class="toolbar-text">色盲</span>
                </button>
                <button class="toolbar-btn" id="bw-toggle" aria-label="黑白模式">
                    <span class="toolbar-icon">⬛⬜</span>
                    <span class="toolbar-text">黑白</span>
                </button>
                <button class="toolbar-btn" id="blind-toggle" aria-label="盲人模式">
                    <span class="toolbar-icon">🎧</span>
                    <span class="toolbar-text">盲人</span>
                </button>
                <button class="toolbar-btn" id="deep-mode-toggle" aria-label="切换 DEEP 模式">
                    <span class="toolbar-icon">🌑</span>
                    <span class="toolbar-text">DEEP</span>
                </button>
                <button class="toolbar-btn" id="toggle-toolbar" aria-label="隐藏工具栏">
                    <span class="toolbar-icon">⚙️</span>
                    <span class="toolbar-text">隐藏</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 主导航栏：无跳转功能 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="logo-link">
                    <span class="logo-icon">⚪</span>
                    <span class="logo-text">圆几何探索</span>
                </span>
            </div>
            <ul class="nav-menu">
                <li><span class="nav-link">首页</span></li>
                <li><span class="nav-link">学习</span></li>
                <li><span class="nav-link">交互</span></li>
                <li><span class="nav-link">游戏</span></li>
                <li><span class="nav-link">测验</span></li>
            </ul>
            <div class="nav-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>
    
    <!-- 面包屑导航：无跳转功能 -->
    <nav class="breadcrumb-nav" id="breadcrumb-nav">
        <div class="container">
            <ol class="breadcrumb">
                <li><span>首页</span></li>
                <li id="current-page">首页</li>
            </ol>
        </div>
    </nav>

    <!-- 首页区域（静态无交互） -->
    <section id="home" class="home-section">
        <div class="minimal-hero">
            <div class="container">
                <div class="hero-content">
                    <h1>圆几何探索</h1>
                    <p class="hero-subtitle">通过AI驱动的交互式学习，掌握圆的几何奥秘</p>
                    <div class="hero-buttons">
                        <button class="btn-primary">开始学习</button>
                        <button class="btn-secondary">观看演示</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 圆的四大定理 -->
        <div class="rules-section">
            <div class="container">
                <h2>圆的四大核心定理</h2>
                <div class="rules-grid">
                    <div class="rule-item">
                        <div class="rule-number">01</div>
                        <h3>圆心角定理</h3>
                        <p>圆心角等于其所对弧的圆周角的两倍</p>
                    </div>
                    <div class="rule-item">
                        <div class="rule-number">02</div>
                        <h3>切线定理</h3>
                        <p>切线与半径垂直，且切点到圆心的距离等于半径</p>
                    </div>
                    <div class="rule-item">
                        <div class="rule-number">03</div>
                        <h3>弦的性质</h3>
                        <p>垂直于弦的直径平分该弦，并且平分弦所对的两条弧</p>
                    </div>
                    <div class="rule-item">
                        <div class="rule-number">04</div>
                        <h3>圆周角定理</h3>
                        <p>同弧或等弧所对的圆周角相等，且等于圆心角的一半</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 学习、交互、游戏、测验区域（静态无交互） -->
    <section id="learning" class="learning-section"><div class="container"><h2>深入学习圆几何</h2></div></section>
    <section id="interactive" class="interactive-section"><div class="container"><h2>交互式学习体验</h2></div></section>
    <section id="game" class="game-section"><div class="container"><h2>互动游戏</h2></div></section>
    <section id="quiz" class="quiz-section"><div class="container"><h2>知识测验与巩固</h2></div></section>

    <!-- 页脚（静态无跳转） -->
    <footer class="footer">
        <div class="container">
            <div class="copyright">
                <p>&copy; 2025 圆几何探索 - 交互式数学学习平台。保留所有权利。</p>
            </div>
        </div>
    </footer>

    <!-- 第三版核心：无障碍工具栏交互JS -->
    <script>
        // 获取DOM元素
        const colorblindBtn = document.getElementById('colorblind-toggle');
        const bwBtn = document.getElementById('bw-toggle');
        const blindBtn = document.getElementById('blind-toggle');
        const deepBtn = document.getElementById('deep-mode-toggle');
        const toggleToolbarBtn = document.getElementById('toggle-toolbar');
        const toolbar = document.getElementById('accessibility-toolbar');
        const toolbarText = toggleToolbarBtn.querySelector('.toolbar-text');
        const body = document.body;

        // 1. 色盲模式切换
        colorblindBtn.addEventListener('click', () => {
            body.classList.toggle('colorblind-mode');
        });

        // 2. 黑白模式切换
        bwBtn.addEventListener('click', () => {
            body.classList.toggle('grayscale-mode');
        });

        // 3. 盲人模式切换（高对比度+屏幕阅读器支持）
        blindBtn.addEventListener('click', () => {
            body.classList.toggle('blind-mode');
            const ariaDesc = document.getElementById('aria-descriptions');
            ariaDesc.style.display = body.classList.contains('blind-mode') ? 'block' : 'none';
            ariaDesc.textContent = '已开启盲人模式，高对比度、大字体、屏幕阅读器适配';
        });

        // 4. DEEP深色模式切换
        deepBtn.addEventListener('click', () => {
            body.classList.toggle('deep-mode');
        });

        // 5. 工具栏隐藏/显示切换
        toggleToolbarBtn.addEventListener('click', () => {
            toolbar.classList.toggle('toolbar-hidden');
            toolbarText.textContent = toolbar.classList.contains('toolbar-hidden') ? '显示' : '隐藏';
        });
    </script>
</body>
</html>
