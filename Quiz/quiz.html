<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circle Theorems Quiz</title>
  <style>
    :root {
      --bg: #f4f8ff;
      --card: rgba(255,255,255,0.82);
      --text: #16324f;
      --muted: #5f7691;
      --primary: #2563eb;
      --primary-2: #7c3aed;
      --line: rgba(37, 99, 235, 0.12);
      --shadow: 0 18px 45px rgba(37, 99, 235, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(124,58,237,0.14), transparent 24%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      padding: 24px;
    }

    .container {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    .badge {
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(37,99,235,0.08);
      color: var(--primary);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .quiz-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: 30px;
    }

    .quiz-head {
      margin-bottom: 24px;
    }

    .quiz-head h1 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 10px;
    }

    .quiz-head p {
      color: var(--muted);
      max-width: 60ch;
    }

    .quiz-info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .info-box {
      background: rgba(37,99,235,0.05);
      border: 1px solid rgba(37,99,235,0.08);
      border-radius: 18px;
      padding: 16px;
    }

    .info-box small {
      display: block;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .info-box strong {
      font-size: 1.15rem;
      color: var(--primary);
    }

    .question-box {
      margin-bottom: 20px;
    }

    .question-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option-btn {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(37,99,235,0.12);
      background: rgba(255,255,255,0.9);
      color: var(--text);
      border-radius: 16px;
      padding: 15px 16px;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s ease;
    }

    .option-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37,99,235,0.10);
    }

    .option-btn.correct {
      background: rgba(34,197,94,0.14);
      border-color: rgba(34,197,94,0.35);
    }

    .option-btn.wrong {
      background: rgba(239,68,68,0.14);
      border-color: rgba(239,68,68,0.35);
    }

    .option-btn.disabled {
      pointer-events: none;
      opacity: 0.92;
    }

    .result-text {
      min-height: 28px;
      margin-top: 16px;
      font-weight: 700;
    }

    .controls {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(37,99,235,0.14);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .btn-outline {
      background: rgba(255,255,255,0.86);
      color: var(--primary);
      border: 1px solid rgba(37,99,235,0.12);
    }

    .final-box {
      display: none;
      text-align: center;
      padding: 20px 0 6px;
    }

    .final-box h2 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .final-box p {
      color: var(--muted);
      margin-bottom: 16px;
    }

    @media (max-width: 760px) {
      .quiz-info {
        grid-template-columns: 1fr;
      }

      .quiz-card {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="UI.html" class="back-link">← Back to Home</a>
      <div class="badge">Quiz & Mock Test</div>
    </div>

    <div class="quiz-card">
      <div class="quiz-head">
        <h1>Circle Theorems Quiz</h1>
        <p>Test your understanding of key circle theorems with a short multiple-choice quiz.</p>
      </div>

      <div class="quiz-info">
        <div class="info-box">
          <small>Question</small>
          <strong id="questionNumber">1 / 5</strong>
        </div>
        <div class="info-box">
          <small>Score</small>
          <strong id="scoreText">0</strong>
        </div>
        <div class="info-box">
          <small>Status</small>
          <strong id="statusText">In Progress</strong>
        </div>
      </div>

      <div id="quizArea">
        <div class="question-box">
          <div class="question-title" id="questionText"></div>
          <div class="options" id="optionsBox"></div>
          <div class="result-text" id="resultText"></div>
        </div>

        <div class="controls">
          <button class="btn btn-primary" id="nextBtn" style="display:none;">Next Question</button>
          <button class="btn btn-outline" id="restartBtn">Restart Quiz</button>
        </div>
      </div>

      <div class="final-box" id="finalBox">
        <h2 id="finalTitle">Quiz Complete</h2>
        <p id="finalMessage"></p>
        <div class="controls" style="justify-content:center;">
          <button class="btn btn-primary" id="restartFinalBtn">Try Again</button>
          <a href="UI.html" class="btn btn-outline" style="text-decoration:none;">Return Home</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const quizData = [
      {
        question: "The angle at the centre is how many times the angle at the circumference standing on the same arc?",
        options: ["The same", "Twice", "Three times", "Half"],
        answer: 1
      },
      {
        question: "The angle in a semicircle is always:",
        options: ["45°", "60°", "90°", "120°"],
        answer: 2
      },
      {
        question: "Angles in the same segment are:",
        options: ["Supplementary", "Equal", "Double", "Opposite"],
        answer: 1
      },
      {
        question: "Opposite angles in a cyclic quadrilateral add up to:",
        options: ["90°", "180°", "270°", "360°"],
        answer: 1
      },
      {
        question: "A radius and a tangent at the point of contact are:",
        options: ["Parallel", "Equal", "Perpendicular", "Opposite"],
        answer: 2
      }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    const questionNumber = document.getElementById("questionNumber");
    const scoreText = document.getElementById("scoreText");
    const statusText = document.getElementById("statusText");
    const questionText = document.getElementById("questionText");
    const optionsBox = document.getElementById("optionsBox");
    const resultText = document.getElementById("resultText");
    const nextBtn = document.getElementById("nextBtn");
    const restartBtn = document.getElementById("restartBtn");
    const finalBox = document.getElementById("finalBox");
    const quizArea = document.getElementById("quizArea");
    const finalMessage = document.getElementById("finalMessage");

    function renderQuestion() {
      answered = false;
      resultText.textContent = "";
      nextBtn.style.display = "none";

      const q = quizData[currentQuestion];
      questionNumber.textContent = `${currentQuestion + 1} / ${quizData.length}`;
      scoreText.textContent = score;
      statusText.textContent = "In Progress";
      questionText.textContent = q.question;

      optionsBox.innerHTML = "";

      q.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = option;
        btn.addEventListener("click", () => handleAnswer(index, btn));
        optionsBox.appendChild(btn);
      });
    }

    function handleAnswer(selectedIndex, selectedBtn) {
      if (answered) return;
      answered = true;

      const q = quizData[currentQuestion];
      const buttons = document.querySelectorAll(".option-btn");

      buttons.forEach((btn, index) => {
        btn.classList.add("disabled");

        if (index === q.answer) {
          btn.classList.add("correct");
        }

        if (index === selectedIndex && index !== q.answer) {
          btn.classList.add("wrong");
        }
      });

      if (selectedIndex === q.answer) {
        score++;
        scoreText.textContent = score;
        resultText.textContent = "Correct!";
        resultText.style.color = "green";
      } else {
        resultText.textContent = "Wrong answer.";
        resultText.style.color = "red";
      }

      nextBtn.style.display = "inline-block";
    }

    function showFinalResult() {
      quizArea.style.display = "none";
      finalBox.style.display = "block";
      statusText.textContent = "Completed";

      finalMessage.textContent = `You scored ${score} out of ${quizData.length}.`;
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;

      if (currentQuestion >= quizData.length) {
        showFinalResult();
      } else {
        renderQuestion();
      }
    });

    function restartQuiz() {
      currentQuestion = 0;
      score = 0;
      quizArea.style.display = "block";
      finalBox.style.display = "none";
      renderQuestion();
    }

    restartBtn.addEventListener("click", restartQuiz);
    document.getElementById("restartFinalBtn").addEventListener("click", restartQuiz);

    renderQuestion();
  </script>
</body>
</html>
