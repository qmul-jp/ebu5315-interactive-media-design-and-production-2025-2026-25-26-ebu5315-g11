<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Theorems Quiz V1.1</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
    body{padding:30px;background:#f5f7fa}
    .container{max-width:800px;margin:auto}
    .quiz-card{background:white;padding:25px;border-radius:16px;box-shadow:0 4px 12px #0001}
    h1{margin-bottom:15px;color:#2563eb}
    .info{display:flex;gap:20px;margin:20px 0}
    .box{padding:10px 15px;background:#eff6ff;border-radius:10px}
    .question{font-size:18px;margin:20px 0}
    .option{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px;text-align:left;cursor:pointer}
    .correct{background:#dcfce7;border-color:#22c55e}
    .wrong{background:#fee2e2;border-color:#ef4444}
    .disabled{pointer-events:none}
    .btn{padding:10px 20px;border:none;border-radius:8px;background:#2563eb;color:white;margin-top:15px;cursor:pointer}
    .final{display:none;text-align:center;margin-top:30px}
  </style>
</head>
<body>
<div class="container">
  <div class="quiz-card">
    <h1>Circle Theorems Quiz</h1>
    <div class="info">
      <div class="box">Question: <span id="qNum">1/5</span></div>
      <div class="box">Score: <span id="score">0</span></div>
    </div>
    <div class="question" id="question"></div>
    <div id="options"></div>
    <div id="result"></div>
    <button class="btn" id="next" style="display:none">Next</button>
    <button class="btn" id="restart">Restart</button>
    <div class="final" id="final">
      <h2>Quiz Complete</h2>
      <p id="finalText"></p>
      <button class="btn" id="restartFinal">Try Again</button>
    </div>
  </div>
</div>
<script>
  const data = [
    {q:"Angle at centre is?",o:["Same","Twice","Three","Half"],a:1},
    {q:"Angle in semicircle?",o:["45","60","90","120"],a:2},
    {q:"Angles in same segment?",o:["Supplementary","Equal","Double","Opposite"],a:1},
    {q:"Cyclic quadrilateral opposite angles?",o:["90","180","270","360"],a:1},
    {q:"Radius and tangent?",o:["Parallel","Equal","Perpendicular","Opposite"],a:2}
  ];
  let curr=0,score=0,answered=false;
  const qNum=document.getElementById("qNum"),scoreEl=document.getElementById("score"),question=document.getElementById("question"),options=document.getElementById("options"),result=document.getElementById("result"),next=document.getElementById("next"),restart=document.getElementById("restart"),final=document.getElementById("final"),finalText=document.getElementById("finalText"),restartFinal=document.getElementById("restartFinal");
  function render(){answered=false;result.innerText="";next.style.display="none";const d=data[curr];qNum.innerText=(curr+1)+"/5";question.innerText=d.q;options.innerHTML="";d.o.forEach((op,i)=>{const b=document.createElement("button");b.className="option";b.innerText=op;b.onclick=()=>check(i,b);options.appendChild(b)})}
  function check(i,b){if(answered)return;answered=true;const all=document.querySelectorAll(".option");all.forEach(x=>x.classList.add("disabled"));if(i===data[curr].a){b.classList.add("correct");result.innerText="Correct!";result.style.color="green";score++;scoreEl.innerText=score}else{b.classList.add("wrong");result.innerText="Wrong!";result.style.color="red";all[data[curr].a].classList.add("correct")}next.style.display="block"}
  next.onclick=()=>{curr++;if(curr>=5){final.style.display="block";finalText.innerText="Score: "+score+"/5"}else render()}
  function reset(){curr=0;score=0;scoreEl.innerText=0;final.style.display="none";render()}
  restart.onclick=reset;restartFinal.onclick=reset;render();
</script>
</body>
</html>
